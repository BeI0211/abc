<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | ProDash Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff",
                        "surface-container-highest": "#e0e3e5",
                        "secondary-fixed-dim": "#bec6e0",
                        "on-tertiary-fixed": "#0b1c30",
                        "error": "#ba1a1a",
                        "secondary": "#565e74",
                        "secondary-container": "#dae2fd",
                        "inverse-on-surface": "#eff1f3",
                        "tertiary-fixed-dim": "#b7c8e1",
                        "on-error-container": "#93000a",
                        "outline": "#737686",
                        "surface-container-low": "#f2f4f6",
                        "surface-container-high": "#e6e8ea",
                        "on-background": "#191c1e",
                        "on-tertiary": "#ffffff",
                        "outline-variant": "#c3c6d7",
                        "on-surface": "#191c1e",
                        "on-primary-container": "#eeefff",
                        "background": "#f7f9fb",
                        "on-tertiary-fixed-variant": "#38485d",
                        "on-secondary-container": "#5c647a",
                        "on-secondary-fixed-variant": "#3f465c",
                        "on-primary-fixed-variant": "#003ea8",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#434655",
                        "surface-variant": "#e0e3e5",
                        "on-primary-fixed": "#00174b",
                        "surface-container": "#eceef0",
                        "tertiary": "#46566c",
                        "inverse-primary": "#b4c5ff",
                        "tertiary-container": "#5e6e85",
                        "tertiary-fixed": "#d3e4fe",
                        "surface-bright": "#f7f9fb",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#e9f0ff",
                        "primary-container": "#2563eb",
                        "on-secondary-fixed": "#131b2e",
                        "surface-tint": "#0053db",
                        "on-secondary": "#ffffff",
                        "surface": "#f7f9fb",
                        "secondary-fixed": "#dae2fd",
                        "inverse-surface": "#2d3133",
                        "primary-fixed-dim": "#b4c5ff",
                        "primary-fixed": "#dbe1ff",
                        "primary": "#004ac6",
                        "surface-dim": "#d8dadc"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "2rem",
                        "max-container": "1440px",
                        "sidebar-width": "260px",
                        "xs": "0.25rem",
                        "lg": "1.5rem",
                        "gutter": "1rem",
                        "md": "1rem",
                        "sm": "0.5rem",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "title-sm": ["Inter"],
                        "code-data": ["JetBrains Mono"],
                        "label-uppercase": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-base": ["Inter"]
                    },
                    "fontSize": {
                        "title-sm": ["18px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "code-data": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
                        "label-uppercase": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "display-lg": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-sm": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-base": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #F8FAFC;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-card-shadow {
            box-shadow: 0px 1px 3px rgba(0, 0, 0, 0.05), 0px 1px 2px rgba(0, 0, 0, 0.03);
        }
        .bg-brand-gradient {
            background: radial-gradient(circle at top left, #dbe1ff 0%, #f7f9fb 40%, #ffffff 100%);
        }
    </style>
</head>
<body class="bg-brand-gradient font-body-base text-on-background min-h-screen flex items-center justify-center p-md">
<!-- Login Container -->
<div class="w-full max-w-[440px] flex flex-col gap-xl">
<!-- Logo Section -->
<div class="flex flex-col items-center gap-sm">
<div class="w-12 h-12 bg-primary rounded-lg flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">dashboard</span>
</div>
<h1 class="font-title-sm text-title-sm text-on-surface">ProDash Admin</h1>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-xl login-card-shadow">
<div class="mb-xl text-center">
<h2 class="font-display-lg text-display-lg text-on-surface mb-xs">Welcome Back</h2>
<p class="font-body-base text-on-surface-variant">Please enter your credentials to continue.</p>
</div>
<form class="flex flex-col gap-lg">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-uppercase text-label-uppercase text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<input class="w-full px-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-base text-on-surface focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all" id="email" placeholder="admin@prodash.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-uppercase text-label-uppercase text-on-surface-variant" for="password">Password</label>
<div class="relative flex items-center">
<input class="w-full pl-md pr-xl py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-base text-on-surface focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="flex items-center justify-between">
<label class="flex items-center gap-sm cursor-pointer group">
<div class="relative flex items-center">
<input class="peer h-5 w-5 cursor-pointer appearance-none rounded border border-outline-variant bg-surface-container-lowest checked:bg-primary checked:border-primary focus:ring-offset-0 focus:ring-0 transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute text-on-primary text-[16px] opacity-0 peer-checked:opacity-100 left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-body-sm text-body-sm text-primary font-semibold hover:underline" href="#">Forgot password?</a>
</div>
<!-- Sign In Button -->
<button class="w-full py-md px-lg bg-primary-container text-on-primary-container font-headline-md text-body-base rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Optional Footer inside card -->
<div class="mt-xl pt-lg border-t border-outline-variant text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Authorized access only. Technical issues? 
                    <a class="text-primary font-semibold hover:underline" href="#">Contact Support</a>
</p>
</div>
</div>
<!-- Decorative background elements (Visual density) -->
<div class="hidden lg:block fixed -bottom-24 -left-24 w-96 h-96 bg-secondary-container/20 rounded-full blur-3xl -z-10"></div>
<div class="hidden lg:block fixed -top-24 -right-24 w-96 h-96 bg-primary-fixed/20 rounded-full blur-3xl -z-10"></div>
</div>
</body></html>
